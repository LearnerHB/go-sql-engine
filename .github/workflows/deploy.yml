name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build linux/amd64 binary
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o sql-engine .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "echo SSH_OK"

      - name: Upload binary
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            sql-engine \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/go-sql-engine/sql-engine

      - name: Restart service
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
              set -e
              chmod +x ~/go-sql-engine/sql-engine
              pm2 delete sql-engine 2>/dev/null || true
              pm2 start ~/go-sql-engine/sql-engine --name sql-engine
              pm2 save
              echo ">>> sql-engine deployed."
            '
