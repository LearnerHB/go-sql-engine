name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build linux/amd64 binary
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o sql-engine .

      - name: Upload binary to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "sql-engine"
          target: "~/go-sql-engine/"

      - name: Restart service via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            chmod +x ~/go-sql-engine/sql-engine
            pm2 delete sql-engine 2>/dev/null || true
            pm2 start ~/go-sql-engine/sql-engine --name sql-engine
            pm2 save
            echo ">>> sql-engine deployed."
